<!-- VERSION CORREGIDA Y OPTIMIZADA -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Familia</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;padding:16px}
button{margin:4px}
</style>
</head>
<body>

<h2>💸 Hoy</h2>
<input id="dAmt" type="number" placeholder="Valor">
<input id="dCat" placeholder="Categoría">
<input id="dNote" placeholder="Nota">
<button onclick="submitDaily()">Agregar</button>

<h3 id="dTotal">$0</h3>
<div id="dList"></div>

<script>

// 🔥 FIREBASE
firebase.initializeApp({
  databaseURL: "https://finanzas-ibarra-maso-default-rtdb.firebaseio.com"
});

const db = firebase.database();
const FBK = "Anny1130";

let dailyRef = null;
let total = 0;
let sending = false;

function todayPath(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `daily/${FBK}/${y}/${m}/${day}`;
}

// ✅ SUSCRIPCIÓN LIMPIA
function subDaily(){
  const path = todayPath();

  if(dailyRef){
    dailyRef.off();
  }

  total = 0;
  document.getElementById('dList').innerHTML = '';

  dailyRef = db.ref(path);

  dailyRef.on('child_added', snap=>{
    const item = snap.val();
    const key = snap.key;

    total += item.amount || 0;
    render(item, key);
    updateTotal();
  });

  dailyRef.on('child_removed', snap=>{
    const item = snap.val();
    total -= item.amount || 0;
    document.getElementById(snap.key)?.remove();
    updateTotal();
  });
}

// ✅ RENDER
function render(item, key){
  const div = document.createElement('div');
  div.id = key;

  div.innerHTML = `
    <b>${item.category}</b> - $${item.amount}
    <small>${item.note||''}</small>
    <button onclick="del('${key}', ${item.amount})">❌</button>
  `;

  document.getElementById('dList').appendChild(div);
}

// ✅ TOTAL
function updateTotal(){
  document.getElementById('dTotal').innerText = '$' + total;
}

// ✅ SUBMIT SIN DUPLICADOS
function submitDaily(){
  if(sending) return;

  const amount = parseFloat(document.getElementById('dAmt').value);
  const category = document.getElementById('dCat').value;
  const note = document.getElementById('dNote').value;

  if(!amount || amount<=0) return;

  sending = true;

  const id = Date.now();

  db.ref(todayPath()+'/'+id).set({
    amount,
    category,
    note,
    ts:new Date().toISOString()
  }).finally(()=>{
    setTimeout(()=>sending=false,500);
  });
}

// 🗑 DELETE
function del(key){
  db.ref(todayPath()+'/'+key).remove();
}

// 🚀 INIT
subDaily();

</script>

</body>
</html>
